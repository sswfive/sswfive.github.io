    <script>
        // 页面访问量统计（兼容不蒜子格式）
        document.addEventListener('DOMContentLoaded', function() {
            // 获取当前页面URL
            var currentPage = window.location.pathname;
            var storageKey = 'page_views_' + currentPage.replace(/[^a-zA-Z0-9]/g, '_');
            
            // 从localStorage获取当前页面访问次数
            var currentViews = localStorage.getItem(storageKey) || 0;
            currentViews = parseInt(currentViews) + 1;
            localStorage.setItem(storageKey, currentViews);
            
            // 获取全站总访问量
            var totalViews = localStorage.getItem('site_total_views') || 0;
            totalViews = parseInt(totalViews) + 1;
            localStorage.setItem('site_total_views', totalViews);
            
            // 更新页面显示
            setTimeout(function() {
                var pageValueEl = document.getElementById('busuanzi_value_page_pv');
                var pageContainerEl = document.getElementById('busuanzi_container_page_pv');
                var siteValueEl = document.getElementById('busuanzi_value_site_pv');
                var siteContainerEl = document.getElementById('busuanzi_container_site_pv');
                
                if (pageValueEl) {
                    pageValueEl.textContent = currentViews;
                }
                if (pageContainerEl) {
                    pageContainerEl.style.display = 'inline';
                }
                
                if (siteValueEl) {
                    siteValueEl.textContent = totalViews;
                }
                if (siteContainerEl) {
                    siteContainerEl.style.display = 'inline';
                }
                
                console.log('页面访问量:', currentViews, '全站访问量:', totalViews);
            }, 500);
        });
    </script>
